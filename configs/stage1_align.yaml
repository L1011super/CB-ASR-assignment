seed: 42

paths:
  train_manifest: data/manifests/train_tts.jsonl
  valid_manifest: data/manifests/valid_tts.jsonl
  whisper_model: pretrained/whisper-small
  qwen_model: pretrained/Qwen2.5-1.5B-Instruct
  output_dir: outputs/stage1_align

data:
  use_null_samples: false
  target_sample_rate: 16000
  max_prompt_length: 256
  max_answer_length: 64
  num_workers: 0

model:
  adapter_type: mean_pool_mlp
  num_query_tokens: 16
  adapter_hidden_size: 1024
  adapter_dropout: 0.1
  freeze_whisper: true
  freeze_qwen: true

training:
  device: cuda:0
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 50
  max_grad_norm: 1.0
  fp16: true
  log_steps: 10
  eval_steps: 100
  save_best: true
